<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码随机图片</title>
<style>
*{margin:0;padding:0;}
body{
  background:#f5f5f5;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
img{
  width:90%;
  max-width:400px;
  border-radius:12px;
  box-shadow:0 0 20px #0002;
}
</style>
</head>
<body>
  <img id="showImg">

<script>
// 在这里填写你的图片文件名，有几张写几张
const imgList = [
  "img1.jpg",
  "img2.jpg",
  "img3.jpg",
  "img4.jpg",
  "img5.jpg"
];
// 随机取一张
let rand = Math.floor(Math.random() * imgList.length);
document.getElementById("showImg").src = imgList[rand];
</script>
</body>
</html>
